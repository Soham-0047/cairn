<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cairn — Verified paths from free tutorials to real careers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0:#07070B;
    --bg-1:#0E0F14;
    --bg-2:#16181F;
    --bg-3:#1d1f28;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --text-hi:#F5F5F7;
    --text-mid:#A1A1AA;
    --text-lo:#71717a;
    --primary:#6366F1;
    --primary-hi:#818CF8;
    --primary-glow: rgba(99,102,241,0.35);
    --mint:#34D399;
    --warm:#FB923C;
    --violet:#8B5CF6;

    --serif:'Instrument Serif', ui-serif, Georgia, serif;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

    --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-2xl:28px;
  }
  [data-theme="light"] {
    --bg-0:#FAFAF7;
    --bg-1:#FFFFFF;
    --bg-2:#F4F4F0;
    --bg-3:#EBEBE6;
    --border: rgba(10,10,15,0.08);
    --border-strong: rgba(10,10,15,0.14);
    --text-hi:#0A0A0F;
    --text-mid:#52525B;
    --text-lo:#71717a;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg-0); color: var(--text-hi); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { overflow-x:hidden; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  ::selection { background: var(--primary); color: white; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: #2a2d38; }

  /* Grain */
  .grain::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.07 0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.5; mix-blend-mode: overlay;
  }

  /* Aurora */
  @keyframes auroraDrift {
    0%   { transform: translate3d(-10%, -10%, 0) rotate(0deg) scale(1.0); }
    50%  { transform: translate3d(10%, 5%, 0) rotate(180deg) scale(1.15); }
    100% { transform: translate3d(-10%, -10%, 0) rotate(360deg) scale(1.0); }
  }
  @keyframes orbDrift1 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(40px,-30px); } }
  @keyframes orbDrift2 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(-50px,40px); } }
  @keyframes orbDrift3 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(20px,60px); } }
  @keyframes shimmer { 0%{ background-position: -200% 0; } 100%{ background-position: 200% 0; } }
  @keyframes pulseGlow { 0%,100%{ box-shadow: 0 0 0 0 var(--primary-glow); } 50%{ box-shadow: 0 0 40px 4px var(--primary-glow); } }
  @keyframes ringRotate { to { transform: rotate(360deg); } }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes flameWiggle { 0%,100%{ transform: rotate(-3deg) scale(1); } 50%{ transform: rotate(3deg) scale(1.05); } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(14px);} to{ opacity:1; transform: translateY(0);} }
  @keyframes scaleIn { from { opacity:0; transform: scale(.96);} to{ opacity:1; transform: scale(1);} }
  @keyframes scan { 0%{ top: 0; opacity: 0;} 10%{opacity:1} 90%{opacity:1} 100%{ top: 100%; opacity:0;} }
  @keyframes flipCard { 0%{ transform: perspective(1200px) rotateY(180deg); opacity:0;} 100%{ transform: perspective(1200px) rotateY(0); opacity: 1;} }
  @keyframes confettiFall { 0%{ transform: translateY(-20px) rotate(0); opacity:1;} 100%{ transform: translateY(420px) rotate(720deg); opacity:0;} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sheen { 0% { transform: translateX(-120%) skewX(-20deg);} 60%,100%{ transform: translateX(220%) skewX(-20deg);} }

  /* Hairlines used a lot */
  .hairline { box-shadow: inset 0 0 0 1px var(--border); }
  .hairline-strong { box-shadow: inset 0 0 0 1px var(--border-strong); }

  /* Type utilities */
  .serif { font-family: var(--serif); letter-spacing: -0.025em; }
  .mono { font-family: var(--mono); }
  .italic { font-style: italic; }

  /* Gradient text */
  .grad-text {
    background: linear-gradient(135deg, #c7c9ff 0%, #fff 35%, #c1f2dd 70%, #ffd6b3 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  [data-theme="light"] .grad-text {
    background: linear-gradient(135deg, #4f46e5 0%, #111 35%, #059669 70%, #c2410c 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .grad-text span { background: inherit; -webkit-background-clip: text; background-clip: text; color: transparent; }

  /* Magnetic button base */
  .btn-magnetic {
    position: relative; display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-radius: 999px;
    font-weight: 500; font-size: 15px; line-height: 1;
    transition: transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s ease;
    overflow: hidden;
  }
  .btn-primary {
    color: white; border: 1px solid rgba(255,255,255,0.18);
    background: linear-gradient(180deg, #7b7ff5 0%, #5258ea 100%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 10px 30px -10px var(--primary-glow), 0 0 0 1px rgba(99,102,241,0.4);
  }
  .btn-primary:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 18px 50px -12px var(--primary-glow), 0 0 0 1px rgba(99,102,241,0.55); }
  .btn-primary .sheen {
    position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
    width: 50%;
  }
  .btn-primary:hover .sheen { animation: sheen 1.1s ease forwards; }
  .btn-ghost {
    color: var(--text-hi); border: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(8px);
  }
  [data-theme="light"] .btn-ghost { background: rgba(255,255,255,0.6); }
  .btn-ghost:hover { background: rgba(255,255,255,0.06); }
  [data-theme="light"] .btn-ghost:hover { background: rgba(0,0,0,0.04); }

  /* Cards */
  .card {
    background: var(--bg-1); border-radius: var(--r-lg);
    box-shadow: inset 0 0 0 1px var(--border);
    position: relative;
  }
  .card-elev {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border-radius: var(--r-lg); box-shadow: inset 0 0 0 1px var(--border), 0 30px 80px -40px rgba(0,0,0,0.6);
    position: relative;
  }

  /* Gradient border card */
  .gbc {
    position: relative; border-radius: var(--r-xl); padding: 1px;
    background: linear-gradient(135deg, rgba(99,102,241,0.55), rgba(52,211,153,0.35) 60%, rgba(251,146,60,0.45));
  }
  .gbc-inner {
    background: var(--bg-1); border-radius: calc(var(--r-xl) - 1px);
  }

  /* Aurora gradient border (animated) */
  .aurora-border {
    position: relative; border-radius: var(--r-xl); padding: 1px; isolation: isolate;
  }
  .aurora-border::before {
    content:''; position:absolute; inset:0; border-radius: inherit; padding:1px;
    background: conic-gradient(from var(--ang,0deg), #6366F1, #34D399, #FB923C, #8B5CF6, #6366F1);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: ringRotate 6s linear infinite;
  }

  /* Pills */
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; box-shadow: inset 0 0 0 1px var(--border-strong); background: var(--bg-2); color: var(--text-mid); }
  .pill .dot { width: 6px; height: 6px; border-radius:999px; background: currentColor; }
  .pill-mint { color: #6ee7b7; background: rgba(52,211,153,0.08); box-shadow: inset 0 0 0 1px rgba(52,211,153,0.25); }
  .pill-indigo { color: #a5b4fc; background: rgba(99,102,241,0.1); box-shadow: inset 0 0 0 1px rgba(99,102,241,0.3); }
  .pill-warm { color: #fdba74; background: rgba(251,146,60,0.08); box-shadow: inset 0 0 0 1px rgba(251,146,60,0.3); }

  /* KBD */
  .kbd { font-family: var(--mono); font-size: 11px; padding: 2px 6px; border-radius: 5px; background: var(--bg-2); box-shadow: inset 0 -1px 0 var(--border-strong), inset 0 0 0 1px var(--border); color: var(--text-mid); }

  /* Marquee */
  .marquee-track { display:flex; gap:48px; width: max-content; animation: ticker 40s linear infinite; }

  /* Skeleton shimmer */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.8s linear infinite;
    border-radius: 8px;
  }

  /* Custom cursor (subtle) */
  .cursor-dot, .cursor-ring { position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
  .cursor-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--primary-hi); mix-blend-mode: difference; transition: transform .12s ease; }
  .cursor-ring { width: 32px; height: 32px; border-radius: 999px; border: 1px solid var(--text-mid); transition: transform .25s ease, width .2s ease, height .2s ease, opacity .2s; opacity:.5; }

  @media (max-width: 900px) {
    .cursor-dot, .cursor-ring { display: none; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }

  /* Nav blur */
  .nav-blur { backdrop-filter: blur(14px) saturate(1.1); -webkit-backdrop-filter: blur(14px) saturate(1.1); background: color-mix(in srgb, var(--bg-0) 70%, transparent); border-bottom: 1px solid var(--border); }

  /* Code block */
  .code-block { font-family: var(--mono); font-size: 13px; line-height: 1.65; }
  .tok-key { color: #c4b5fd; } .tok-str { color: #6ee7b7; } .tok-com { color: #71717a; font-style: italic; } .tok-num { color: #fdba74; } .tok-fn { color: #93c5fd; } .tok-kw { color: #f0abfc; }

  /* Section base */
  section { position: relative; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
  @media (max-width: 640px) { .container { padding: 0 20px; } }

  /* Focus */
  :focus-visible { outline: 2px solid var(--primary-hi); outline-offset: 2px; border-radius: 6px; }

  /* Page entrance */
  .page-enter { animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both; }

  /* Pulse */
  .pulse-soft { animation: pulseGlow 3s ease-in-out infinite; }

  /* Topbar progress */
  .topbar-progress { position: fixed; top: 0; left: 0; right: 0; height: 2px; background: transparent; z-index: 99; pointer-events: none; }
  .topbar-progress > div { height: 100%; background: linear-gradient(90deg, var(--primary), var(--mint), var(--warm)); width: 0%; transition: width .25s ease; }

</style>
</head>
<body>
  <div class="topbar-progress"><div id="__progress"></div></div>
  <div class="cursor-ring" id="__ring"></div>
  <div class="cursor-dot" id="__dot"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // Cursor + scroll progress (vanilla, lightweight)
    (function(){
      const dot = document.getElementById('__dot');
      const ring = document.getElementById('__ring');
      let rx=0, ry=0, dx=0, dy=0;
      window.addEventListener('mousemove', e=>{
        dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
        rx = e.clientX; ry = e.clientY;
      });
      function tick(){
        dx += (rx - dx) * 0.18; dy += (ry - dy) * 0.18;
        ring.style.transform = `translate(${dx}px, ${dy}px) translate(-50%,-50%)`;
        requestAnimationFrame(tick);
      }
      tick();
      document.addEventListener('mouseover', e=>{
        if (e.target.closest('a,button,[data-magnet]')) {
          ring.style.width = '56px'; ring.style.height = '56px'; ring.style.opacity = '0.9';
        } else {
          ring.style.width = '32px'; ring.style.height = '32px'; ring.style.opacity = '0.5';
        }
      });
      // Scroll progress
      const p = document.getElementById('__progress');
      function onScroll(){
        const sc = document.scrollingElement;
        const max = sc.scrollHeight - sc.clientHeight;
        p.style.width = max>0 ? (sc.scrollTop / max * 100) + '%' : '0%';
      }
      window.addEventListener('scroll', onScroll, { passive:true });
    })();
  </script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="projects.jsx"></script>
  <script type="text/babel" src="portfolio.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
