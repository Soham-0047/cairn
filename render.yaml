services:
  - type: web
    name: cairn-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: cairn
      - key: ADMIN_SECRET
        sync: false
      - key: GITHUB_TOKEN_FOR_PUBLIC_READS
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: EXA_FALLBACK_TAVILY_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: cairn_paths
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: ADMIN_SERVICE_ENABLED
        value: "false"
